openapi: "3.0.0"
info:
  version: "1.0.0"
paths: {}
components:
  schemas:
    User:
      type: object
      properties:
        id:
          description: Unique identifier for the user
          type: integer
          format: uint32
        username:
          description: The user's username
          type: string
    Bucket:
      type: object
      properties:
        uuid:
          description: Unique identifier for the bucket
          type: string
          format: uuid
        name:
          description: Bucket name
          type: string
    FileChunk:
      type: object
      properties:
        chunk_id:
          description: Chunk sequence number
          type: integer
          format: uint32
        offset:
          description: Byte offset in original file
          type: integer
          format: uint64
        total_size:
          description: Total file size in bytes
          type: integer
          format: uint64
        checksum:
          description: CRC32 checksum of chunk data
          type: integer
          format: uint32
        data:
          description: Raw chunk payload
          type: string
          format: binary
